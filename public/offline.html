<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#FF5F1F" />
  <title>Offline — Boss of Clean</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: #FAF8F5; color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      text-align: center; padding: 24px;
    }
    .card { max-width: 360px; }
    img { width: 96px; height: 96px; margin-bottom: 20px; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { font-size: 15px; line-height: 1.5; color: #555; margin: 0 0 24px; }
    button {
      background: #FF5F1F; color: #fff; border: 0; border-radius: 10px;
      padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer;
      min-height: 44px;
    }
    button:active { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/android-chrome-192x192.png" alt="Boss of Clean" />
    <h1>You're offline</h1>
    <p>Boss of Clean needs a connection for this page. Check your network and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
